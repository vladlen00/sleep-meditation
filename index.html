<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Медитация глубокого сна — irena.bio</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Raleway:wght@200;300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width:100%; height:100%; background:#040208; overflow:hidden; font-family:'Raleway',sans-serif; touch-action:manipulation; }

  #c { position:fixed; inset:0; z-index:0; }

  .screen {
    position:relative; z-index:2;
    height:100%;
    display:flex; flex-direction:column; align-items:center; justify-content:space-between;
    padding: clamp(32px,6vh,56px) 32px clamp(28px,5vh,48px);
    pointer-events:none;
  }

  .title {
    font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:300;
    font-size:clamp(1.2rem,4.5vw,1.8rem);
    letter-spacing:0.14em;
    color:rgba(210,120,150,0.85);
    text-shadow:0 2px 10px rgba(0,0,0,1), 0 0 25px rgba(180,30,70,0.5);
    text-align:center; width:100%; padding:0 16px;
  }

  .bottom {
    pointer-events:all;
    display:flex; flex-direction:column; align-items:center; gap:14px; width:100%;
  }

  .btn {
    background:rgba(0,0,0,0.5);
    border:1px solid rgba(160,30,70,0.55);
    border-radius:40px;
    color:rgba(210,130,160,1);
    font-family:'Raleway',sans-serif; font-weight:300;
    font-size:clamp(0.68rem,2.2vw,0.82rem);
    letter-spacing:0.45em; text-transform:uppercase;
    padding:14px 40px; cursor:pointer;
    transition:all 0.4s;
    text-shadow:0 0 12px rgba(180,40,80,0.6);
    box-shadow:0 0 20px rgba(160,20,60,0.15);
    backdrop-filter:blur(6px);
    -webkit-tap-highlight-color:transparent;
    min-width:160px;
  }
  .btn:hover, .btn:active {
    border-color:rgba(210,60,100,0.85); color:#fff;
    box-shadow:0 0 35px rgba(180,30,70,0.35);
  }

  .progress-wrap {
    width:clamp(240px,80vw,360px);
    display:none; flex-direction:column; gap:7px; align-items:center;
    background:rgba(0,0,0,0.5); border-radius:20px;
    padding:12px 20px; backdrop-filter:blur(6px);
  }
  .progress-track {
    width:100%; height:8px;
    background:rgba(160,20,60,0.15); border-radius:8px;
    cursor:pointer;
  }
  .progress-track:hover { background:rgba(160,20,60,0.25); }
  .progress-fill {
    height:100%; width:0%;
    background:linear-gradient(90deg,#6b0a2a,#c0184a);
    border-radius:3px; transition:width 1s linear;
    box-shadow:0 0 8px rgba(180,24,74,0.7);
  }
  .progress-time {
    font-family:'Raleway',sans-serif; font-weight:200;
    font-size:clamp(0.65rem,2vw,0.75rem);
    letter-spacing:0.3em; color:rgba(200,100,140,0.7);
    text-shadow:0 1px 6px rgba(0,0,0,0.9);
  }
  .skip-row {
    display:flex; align-items:center; justify-content:center; gap:20px; width:100%;
  }
  .skip-btn {
    background:none; border:none; cursor:pointer;
    color:rgba(200,120,150,0.6); font-family:'Raleway',sans-serif;
    font-size:0.72rem; letter-spacing:0.15em;
    display:flex; flex-direction:column; align-items:center; gap:3px;
    padding:6px 10px; border-radius:8px;
    transition:all 0.2s; -webkit-tap-highlight-color:transparent;
  }
  .skip-btn:hover, .skip-btn:active { color:rgba(230,150,180,1); }
  .skip-btn svg { width:22px; height:22px; }
  .skip-label { font-size:0.62rem; letter-spacing:0.1em; opacity:0.7; }

  /* Author */
  .author {
    position:fixed; bottom:10px; left:0; right:0;
    display:flex; align-items:center; justify-content:center; gap:6px;
    z-index:3; pointer-events:none;
  }
  .author-name {
    font-family:'Raleway',sans-serif; font-weight:200;
    font-size:0.72rem; letter-spacing:0.25em;
    color:rgba(200,100,140,0.75);
    text-shadow:0 1px 4px rgba(0,0,0,0.9);
  }

  /* Finish */
  .finish {
    display:none; position:fixed; inset:0; z-index:20;
    background:rgba(4,2,8,0.94);
    flex-direction:column; align-items:center; justify-content:center;
    gap:22px; text-align:center; padding:40px;
  }
  .finish.show { display:flex; }
  .finish-title {
    font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:300;
    font-size:clamp(1.2rem,5vw,1.7rem); letter-spacing:0.1em;
    color:rgba(210,120,150,0.75); opacity:0;
    animation:fu 1.5s ease 0.3s forwards;
  }
  .finish-sub {
    font-size:clamp(0.62rem,2vw,0.72rem); letter-spacing:0.35em;
    text-transform:uppercase; color:rgba(160,60,100,0.25);
    opacity:0; animation:fu 1.5s ease 0.9s forwards;
  }
  .finish-author {
    display:flex; align-items:center; gap:6px;
    opacity:0; animation:fu 1.5s ease 1.2s forwards;
  }
  .finish-btn { opacity:0; animation:fu 1.5s ease 1.4s forwards; }
  @keyframes fu { to { opacity:1; } }
</style>
</head>
<body>

<canvas id="c"></canvas>

<audio id="audio" preload="auto">
  <source src="meditation_sleep.mp3" type="audio/mpeg">
</audio>

<div class="screen">
  <div class="title">Медитация глубокого сна</div>
  <div class="bottom">
    <button class="btn" id="mainBtn">Старт</button>
    <div class="progress-wrap" id="pw">
      <div class="progress-track" id="progressTrack"><div class="progress-fill" id="pf"></div></div>
      <div class="skip-row">
        <button class="skip-btn" id="skipBack">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 17l-5-5 5-5"/><path d="M18 17l-5-5 5-5"/>
          </svg>
          <span class="skip-label">−15 сек</span>
        </button>
        <div class="progress-time" id="pt">осталось 15:00</div>
        <button class="skip-btn" id="skipFwd">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M13 17l5-5-5-5"/><path d="M6 17l5-5-5-5"/>
          </svg>
          <span class="skip-label">+15 сек</span>
        </button>
      </div>
    </div>
  </div>
</div>

<div class="author">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(200,100,140,0.75)" stroke-width="1.5" stroke-linecap="round">
    <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
    <circle cx="12" cy="12" r="4"/>
    <circle cx="17.5" cy="6.5" r="1.2" fill="rgba(200,100,140,0.75)" stroke="none"/>
  </svg>
  <span class="author-name">irena.bio</span>
</div>

<div class="finish" id="fin">
  <div class="finish-title">Спокойной ночи...</div>
  <div class="finish-sub">Позвольте себе раствориться в покое</div>
  <div class="finish-author">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(200,100,140,0.6)" stroke-width="1.5" stroke-linecap="round">
      <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
      <circle cx="12" cy="12" r="4"/>
      <circle cx="17.5" cy="6.5" r="1.2" fill="rgba(200,100,140,0.6)" stroke="none"/>
    </svg>
    <span style="font-family:'Raleway',sans-serif;font-weight:200;font-size:0.68rem;letter-spacing:0.25em;color:rgba(200,100,140,0.6);">irena.bio</span>
  </div>
  <button class="btn" id="repeatBtn">Повторить</button>
</div>

<script>
// ── Canvas ───────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, cx, cy, S;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W/2; cy = H/2;
  S = Math.min(W, H);
}
window.addEventListener('resize', resize);
resize();

const PI2 = Math.PI * 2;

function petal(ocx, ocy, len, angle, w, fillStyle) {
  ctx.save();
  ctx.translate(ocx, ocy);
  ctx.rotate(angle);
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo( w, -len*0.35,  w, -len*0.78, 0, -len);
  ctx.bezierCurveTo(-w, -len*0.78, -w, -len*0.35, 0,  0);
  ctx.fillStyle = fillStyle;
  ctx.fill();
  ctx.restore();
}

class Spark {
  constructor() { this.reset(true); }
  reset(init) {
    this.x    = cx + (Math.random()-0.5)*S*0.5;
    this.y    = init ? Math.random()*H : cy + S*0.15;
    this.vx   = (Math.random()-0.5)*0.6;
    this.vy   = -(0.4 + Math.random()*1.2);
    this.life = init ? Math.random()*120 : 0;
    this.maxL = 80 + Math.random()*120;
    this.r    = 0.8 + Math.random()*2;
    this.hue  = 320 + Math.random()*40;
    this.phase= Math.random()*PI2;
  }
  update() {
    this.life++;
    this.x += this.vx + Math.sin(this.life*0.08+this.phase)*0.4;
    this.y += this.vy;
    if (this.life >= this.maxL || this.y < -10) this.reset(false);
  }
  draw() {
    const t = this.life/this.maxL;
    const a = (t<0.2 ? t/0.2 : 1-t)*0.95;
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    ctx.globalAlpha = a;
    ctx.fillStyle = `hsl(${this.hue},95%,75%)`;
    ctx.shadowBlur = 8; ctx.shadowColor = `hsl(${this.hue},100%,65%)`;
    ctx.beginPath(); ctx.arc(this.x, this.y, this.r*(1-t*0.5), 0, PI2); ctx.fill();
    ctx.restore();
  }
}
const sparks = Array.from({length: 70}, () => new Spark());

let t = 0;

function drawFrame() {
  t += 0.006;
  ctx.fillStyle = 'rgba(4,2,8,0.22)';
  ctx.fillRect(0, 0, W, H);

  const R = S * 0.38;
  ctx.save();
  ctx.globalCompositeOperation = 'screen';

  const halo = ctx.createRadialGradient(cx, cy, 0, cx, cy, R*1.4);
  halo.addColorStop(0, `rgba(120,10,40,${0.12+0.05*Math.sin(t*0.7)})`);
  halo.addColorStop(0.6, 'rgba(60,5,25,0.05)');
  halo.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = halo; ctx.fillRect(0,0,W,H);

  ctx.save(); ctx.translate(cx,cy); ctx.rotate(t*0.18);
  for (let i=0;i<8;i++) {
    const a=(i/8)*PI2, p=0.78+0.22*Math.sin(t*1.2+i*0.5), hue=330+i*3;
    petal(0,0,R,a,R*0.19*p,`hsla(${hue},75%,30%,${0.25*p})`);
  }
  ctx.restore();

  ctx.save(); ctx.translate(cx,cy); ctx.rotate(-t*0.32);
  for (let i=0;i<12;i++) {
    const a=(i/12)*PI2, p=0.75+0.25*Math.sin(t*1.05+i*0.45), hue=340+i*2;
    petal(0,0,R*0.68,a,R*0.12*p,`hsla(${hue},80%,38%,${0.30*p})`);
  }
  ctx.restore();

  ctx.save(); ctx.translate(cx,cy); ctx.rotate(t*0.55);
  for (let i=0;i<6;i++) {
    const a=(i/6)*PI2, p=0.82+0.18*Math.sin(t*1.6+i*0.7);
    petal(0,0,R*0.38,a,R*0.075*p,`hsla(350,90%,55%,${0.42*p})`);
  }
  ctx.restore();

  ctx.save(); ctx.translate(cx,cy); ctx.rotate(-t*1.1);
  for (let i=0;i<4;i++) {
    const a=(i/4)*PI2, p=0.88+0.12*Math.sin(t*2.2+i);
    petal(0,0,R*0.17,a,R*0.04*p,`hsla(0,90%,70%,${0.55*p})`);
  }
  ctx.restore();

  [0.72,0.5,0.32,0.18].forEach((frac,i) => {
    ctx.beginPath(); ctx.arc(cx,cy,R*frac,0,PI2);
    ctx.strokeStyle=`hsla(${340+i*5},70%,45%,${0.07+0.04*Math.sin(t*0.9+i)})`;
    ctx.lineWidth=0.6; ctx.stroke();
  });

  const coreR = R*0.09*(0.88+0.12*Math.sin(t*2.8));
  const core = ctx.createRadialGradient(cx,cy,0,cx,cy,coreR);
  core.addColorStop(0, `hsla(0,80%,90%,${0.95+0.05*Math.sin(t*3.5)})`);
  core.addColorStop(0.35,'hsla(350,80%,65%,0.85)');
  core.addColorStop(0.7,'hsla(330,85%,45%,0.5)');
  core.addColorStop(1,'hsla(310,80%,30%,0)');
  ctx.fillStyle=core; ctx.beginPath(); ctx.arc(cx,cy,coreR,0,PI2); ctx.fill();
  ctx.restore();

  sparks.forEach(s => { s.update(); s.draw(); });
  requestAnimationFrame(drawFrame);
}
drawFrame();

// ── UI Elements ───────────────────────────────────────────────────────────────
const audio     = document.getElementById('audio');
const mainBtn   = document.getElementById('mainBtn');
const pw        = document.getElementById('pw');
const pf        = document.getElementById('pf');
const pt        = document.getElementById('pt');
const fin       = document.getElementById('fin');
const repeatBtn = document.getElementById('repeatBtn');
const track     = document.getElementById('progressTrack');
const skipBack  = document.getElementById('skipBack');
const skipFwd   = document.getElementById('skipFwd');

let mode = 'start';
let rafAudio = null;
let elapsed = 0, lastTs = null;
const SESSION = 900; // fallback 15 мин

function fmt(s) {
  s = Math.max(0, Math.floor(s));
  return Math.floor(s/60) + ':' + String(s%60).padStart(2,'0');
}

function updateBar() {
  const dur = (audio.duration && isFinite(audio.duration)) ? audio.duration : SESSION;
  const left = Math.max(dur - elapsed, 0);
  pf.style.width = (Math.min(elapsed/dur,1)*100)+'%';
  pt.textContent = 'осталось ' + fmt(left);
}

// Скруб-бар — клик
track.addEventListener('click', function(e) {
  if (mode === 'start') return;
  const rect = this.getBoundingClientRect();
  const frac = Math.max(0, Math.min(1, (e.clientX-rect.left)/rect.width));
  const dur = (audio.duration && isFinite(audio.duration)) ? audio.duration : SESSION;
  elapsed = frac * dur;
  audio.currentTime = elapsed;
  lastTs = null;
  updateBar();
});

// Перемотка ±15 сек
function skip(sec) {
  if (mode === 'start') return;
  const dur = (audio.duration && isFinite(audio.duration)) ? audio.duration : SESSION;
  elapsed = Math.max(0, Math.min(dur-1, elapsed+sec));
  audio.currentTime = elapsed;
  lastTs = null;
  updateBar();
}
skipBack.addEventListener('click', () => skip(-15));
skipFwd.addEventListener('click',  () => skip(15));

function tickAudio(ts) {
  if (mode !== 'playing') return;
  if (lastTs) elapsed += (ts - lastTs) / 1000;
  lastTs = ts;
  const dur = (audio.duration && isFinite(audio.duration)) ? audio.duration : SESSION;
  const left = Math.max(dur - elapsed, 0);
  updateBar();
  if (left <= 25) audio.volume = Math.max(0, (left / 25) * 0.9);
  if (left <= 0) { endSession(); return; }
  rafAudio = requestAnimationFrame(tickAudio);
}

mainBtn.addEventListener('click', function() {
  if (mode === 'start') {
    mode = 'playing';
    elapsed = 0; lastTs = null;
    pw.style.display = 'flex';
    mainBtn.textContent = 'Пауза';
    audio.currentTime = 0;
    audio.volume = 0;
    audio.play().catch(function(){});
    let v = 0;
    const fi = setInterval(function() {
      v = Math.min(v + 0.04, 0.9);
      audio.volume = v;
      if (v >= 0.9) clearInterval(fi);
    }, 200);
    rafAudio = requestAnimationFrame(tickAudio);

  } else if (mode === 'playing') {
    mode = 'paused';
    lastTs = null;
    cancelAnimationFrame(rafAudio);
    audio.pause();
    mainBtn.textContent = 'Продолжить';

  } else if (mode === 'paused') {
    mode = 'playing';
    audio.play().catch(function(){});
    mainBtn.textContent = 'Пауза';
    rafAudio = requestAnimationFrame(tickAudio);
  }
});

repeatBtn.addEventListener('click', function() {
  mode = 'start';
  elapsed = 0; lastTs = null;
  cancelAnimationFrame(rafAudio);
  audio.pause();
  fin.classList.remove('show');
  pf.style.width = '0%';
  pw.style.display = 'none';
  mainBtn.textContent = 'Старт';
});


// Фикс: возобновляем аудио когда Telegram возвращает фокус
document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'visible' && mode === 'playing') {
    audio.play().catch(function(){});
    lastTs = null;
    if (!rafAudio) rafAudio = requestAnimationFrame(tickAudio);
  }
});
window.addEventListener('focus', function() {
  if (mode === 'playing') {
    audio.play().catch(function(){});
    lastTs = null;
  }
});

function endSession() {
  mode = 'start';
  cancelAnimationFrame(rafAudio);
  audio.pause();
  fin.classList.add('show');
}
</script>
</body>
</html>
